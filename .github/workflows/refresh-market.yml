name: refresh-market

# Refresh the REPOSITORY snapshot of market data (bootstrap/dev copy).
# Production data does NOT come from here: the self-host box runs the same
# pipeline on its own 2 h systemd timer and Caddy serves the box's copy.
# This cron exists so a fresh clone / new box deploy starts with data that
# is at most a day old (its first own scrape lands within 2 h anyway).
# Each run takes ~30-45 minutes (~3800 items × 2 calls × 0.34 s pacing).

on:
  schedule:
    # Daily, offset from the box's timer (which fires at even UTC hours
    # +≤10 min jitter and runs ~45 min): 03:05 sits in the 02:55–04:00 gap,
    # so the two scrapers never hit WFM at the same time.
    - cron: '5 3 * * *'
  workflow_dispatch:        # also runnable manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh-market
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      # No `cache: pip` — setup-python hard-errors on it when the repo has no
      # requirements.txt/pyproject.toml, killing every run before the scrape.
      # The only dep is `requests`; caching buys nothing.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests

      # One scrape entrypoint shared with the self-host systemd timer —
      # scrape, truncation guard (row-count floor + 25%-shrinkage check
      # against the checked-out prior CSV), and the full-shape rebuild all
      # live in deploy/run-scrape.sh so the logic can't drift between the
      # two runners again.
      - name: Scrape, guard, rebuild
        env:
          APP: ${{ github.workspace }}
          PYTHON: python3
        run: bash deploy/run-scrape.sh

      - name: Commit if changed
        run: |
          git config user.name  "wfm-bot"
          git config user.email "wfm-bot@users.noreply.github.com"
          git add prototype/public/market.json prototype/public/wfstat-catalog.json wfm_results.csv
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit."
            exit 0
          fi
          ts=$(date -u +'%Y-%m-%dT%H:%MZ')
          git commit -m "market refresh ${ts}"
          git push
