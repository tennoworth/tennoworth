name: audit

# Runs dependency advisories across both ecosystems on every push and on a
# weekly schedule. Fails the workflow on anything moderate-or-higher so we
# notice before users do.

on:
  push:
    branches: [main, develop]
    # The 2-hourly market-refresh bot commits touch only these three data
    # files; skip a full CI run for a data-only push (~85 wasted runs/week).
    paths-ignore:
      - 'prototype/public/market.json'
      - 'prototype/public/wfstat-catalog.json'
      - 'wfm_results.csv'
  pull_request:
  schedule:
    - cron: '17 4 * * 1'  # every Monday at 04:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bun-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prototype
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: bun audit (moderate+)
        run: bun audit --prod --audit-level=moderate
      - name: tests
        run: bun run test
      - name: type-check
        run: bunx svelte-check --threshold error
      - name: build
        run: bun run build

  cargo-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: companion
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: companion
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: cargo audit
        run: cargo audit --deny warnings

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install pytest requests
      - name: pytest
        # Parity gates are excluded here: they need the Rust binary and have
        # their own build-and-run jobs (convert-parity / scrape-parity) —
        # collecting them binary-less in CI would fail by design.
        run: pytest tests/ --ignore=tests/test_convert_parity.py --ignore=tests/test_scrape_parity.py

  cargo-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: companion
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: companion
      - name: cargo test
        run: cargo test

  # Parity gate for the Python→Rust converter port: builds the host-only
  # wfm-scrape binary, then runs both converters on the frozen fixtures and
  # semantically diffs their market.json. GitHub sets CI=true, so a missing
  # binary FAILS the job rather than silently skipping.
  convert-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: companion
      - name: Build wfm-scrape (release)
        working-directory: companion
        run: cargo build --release -p wfm-scrape
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install pytest requests
      - name: pytest parity
        run: pytest tests/test_convert_parity.py

  # Parity gate for the Python→Rust scraper port (wfm_demand.py → wfm-scrape
  # `scrape`): builds the host-only binary, then runs both scrapers on the
  # frozen fixtures and semantically diffs their output CSVs. GitHub sets
  # CI=true, so a missing binary FAILS the job rather than silently skipping.
  scrape-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: companion
      - name: Build wfm-scrape (release)
        working-directory: companion
        run: cargo build --release -p wfm-scrape
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install pytest requests
      - name: pytest parity
        run: pytest tests/test_scrape_parity.py
