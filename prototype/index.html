<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Defense-in-depth CSP. Allowed origins:
        connect-src: 127.0.0.1 + localhost (companion's loopback HTTP server).
                     No third-party origins — all vendor data (market.json,
                     wfstat-catalog.json) is baked at build time and served
                     same-origin. warframestat.us was dropped when upstream
                     dropped CORS (2026-06-09); the resolver catalog is baked
                     now.
        script-src:  self only — no inline, no remote scripts
        style-src:   self + 'unsafe-inline' for Svelte's scoped style injection
        img-src:     self + data: (Vite injects small assets as data: URIs)

      `frame-ancestors`, `Strict-Transport-Security`, and `X-Frame-Options`
      can only be set as real HTTP headers, not via <meta>. They live in
      public/_headers for Cloudflare Pages / Netlify / Vercel deployments.
      GitHub Pages silently drops that file, which is one reason we'll move
      off it for production. The CSP below still gives us script/connect/
      style protection on GH Pages.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        connect-src 'self' http://127.0.0.1:* http://localhost:*;
        script-src 'self';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data:;
        font-src 'self';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
      "
    />
    <meta http-equiv="Referrer-Policy" content="no-referrer" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <title>TennoWorth — what to sell in Warframe, right now</title>
    <meta
      name="description"
      content="Drop your Warframe inventory and TennoWorth ranks what's actually worth selling on warframe.market right now — Baro flips, set-vs-parts arbitrage, ducat dumps. A no-Overwolf AlecaFrame alternative that runs on Windows and Linux. No account, no upload — everything stays in your browser."
    />
    <link rel="canonical" href="https://tennoworth.app/" />
    <meta name="theme-color" content="#0e0f12" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <!--
      og:url / og:image use the canonical absolute origin because social
      scrapers (Discord, Twitter, Slack) fetch them server-side, not
      relative to the page. They are NOT subject to the page CSP. Update
      the origin here if the canonical domain changes from tennoworth.app.
    -->
    <meta property="og:site_name" content="TennoWorth" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tennoworth.app/" />
    <meta property="og:title" content="TennoWorth — what to sell in Warframe, right now" />
    <meta
      property="og:description"
      content="Ranks your Warframe inventory by what's worth selling on warframe.market right now. No-Overwolf AlecaFrame alternative for Windows + Linux. Nothing leaves your browser."
    />
    <meta property="og:image" content="https://tennoworth.app/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TennoWorth — what to sell in Warframe, right now" />
    <meta
      name="twitter:description"
      content="Ranks your Warframe inventory by what's worth selling right now. No-Overwolf AlecaFrame alternative for Windows + Linux."
    />
    <meta name="twitter:image" content="https://tennoworth.app/og.png" />
  </head>
  <body>
    <div id="app"></div>
    <!--
      Crawlable fallback for non-JS bots and a plain-text description of
      the tool. The Svelte app mounts into #app and never touches this
      sibling; users with JS see the real app, not this block.
    -->
    <noscript>
      <main style="max-width:42rem;margin:4rem auto;padding:0 1.25rem;font-family:system-ui,sans-serif;color:#e6e8ec;background:#0e0f12;line-height:1.55;">
        <h1>TennoWorth — what to sell in Warframe, right now</h1>
        <p>
          TennoWorth cross-references your Warframe inventory against a
          warframe.market price snapshot and ranks what's actually worth
          selling: live sell-score, Baro Ki'Teer buy-and-hold flip timing,
          set-vs-parts arbitrage, and ducat-dump efficiency.
        </p>
        <p>
          It's a no-Overwolf alternative to AlecaFrame that treats
          <strong>Windows and Linux as equal, first-class targets</strong> —
          including Steam Deck. There's no account and no upload: a tiny
          local companion reads your inventory from the running game, and the
          ranking happens entirely in your browser.
        </p>
        <p>This page needs JavaScript enabled to run the dashboard.</p>
      </main>
    </noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
